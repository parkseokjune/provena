name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      # cache the downloaded sentence-embedding model across runs
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2

      - run: npm ci

      - name: Unit tests + judge wiring (no model, no network)
        run: npm test

      - name: Held-out attribution regression (embedding model)
        env:
          PROVENA_ASSERT: "1"
          PROVENA_MIN_F1: "0.85"
        run: node src/eval-heldout.ts
